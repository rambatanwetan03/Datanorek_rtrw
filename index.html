            if (supabaseClient) {
                const { data, error } = await supabaseClient

                    .select('*')
                    .order('noWilayah', { ascending: true });
                
                if (!error && data && data.length > 0) {
                    dataWarga = data;
                } else if (error) {
                    console.error("Fetch error:", error);
                }
            }
            // Trigger pembaruan tampilan tabel
            if (typeof window.renderTable === 'function') {
                window.renderTable();
            }
        };

                    noWilayah: citizenData.noWilayah,
                    rekening: citizenData.rekening,
                    hp: citizenData.hp,
                    alamat: citizenData.alamat
                };

                const { error } = await supabaseClient.from('Warga').insert([payload]);
                
                if (error) {
                    console.error("Error saving to Supabase:", error);
                    alert("Gagal menyimpan ke database!");
                } else {
                    await window.fetchData();
                }
            } else {

                window.renderTable();
            }
        };

                    await window.fetchData();
                } else {
                    console.error("Delete error:", error);
                }
            } else {
                dataWarga = dataWarga.filter(w => w.id !== id);
                window.renderTable();
            }

    <script>
        // --- LOGIKA UI & TABEL ---
        window.togglePassword = () => {
            const passwordInp = document.getElementById('password');
            const eyeOpen = document.getElementById('eyeOpen');
            const eyeClosed = document.getElementById('eyeClosed');
            passwordInp.type = passwordInp.type === 'password' ? 'text' : 'password';
            eyeOpen.classList.toggle('hidden');
            eyeClosed.classList.toggle('hidden');
        };

        window.renderTable = function() {
            const tableBody = document.getElementById('tableBody');
            const rawData = (typeof window.getDataWarga === 'function') ? window.getDataWarga() : [];
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('filterWilayah').value;
            const role = (typeof window.getSessionRole === 'function') ? window.getSessionRole() : null;
            
            tableBody.innerHTML = '';
            
            let filtered = rawData.filter(w => {
                const currentName = (w.Nama || w.nama || "").toLowerCase();
                const currentAlamat = (w.alamat || "").toLowerCase();
                const currentRekening = (w.rekening || "").toLowerCase();
                const typeMatch = filter === "Semua" || w.tipeWilayah === filter;
                const searchMatch = currentName.includes(search) || currentAlamat.includes(search) || currentRekening.includes(search);
                return searchMatch && typeMatch;
            });

            if (filtered.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
            } else {
                document.getElementById('emptyState').classList.add('hidden');
                filtered.sort((a, b) => (a.noWilayah || 0) - (b.noWilayah || 0));

                filtered.forEach((w, i) => {
                    const tr = document.createElement('tr');
                    tr.className = "border-b hover:bg-blue-50/30 transition-colors";
                    
                    const waNumber = (w.hp || '').replace(/[^0-9]/g, '');
                    const waLink = waNumber ? `https://wa.me/${waNumber.startsWith('0') ? '62' + waNumber.slice(1) : (waNumber.startsWith('62') ? waNumber : '62' + waNumber)}` : '#';
                    const deleteBtn = role === 'admin' ? `<button onclick="askDelete('${w.id}')" class="text-red-400 hover:text-red-600 font-bold px-2 py-1">Hapus</button>` : '';

                    tr.innerHTML = `
                        <td class="px-4 py-3 border text-center text-xs text-gray-400">${i + 1}</td>
                        <td class="px-4 py-3 border font-semibold">${w.Nama || w.nama}</td>
                        <td class="px-4 py-3 border text-center font-bold text-blue-700 text-xs">${w.tipeWilayah || ''} ${String(w.noWilayah || '').padStart(2, '0')}</td>
                        <td class="px-4 py-3 border font-mono text-xs text-gray-600">${w.rekening || '-'}</td>
                        <td class="px-4 py-3 border text-xs text-gray-600 italic">${w.alamat || '-'}</td>
                        <td class="px-4 py-3 border text-xs">${w.hp || '-'}</td>
                        <td class="px-4 py-3 border text-center no-print">
                            <div class="flex items-center justify-center gap-2">
                                <a href="${waLink}" target="_blank" class="bg-green-500 text-white p-1.5 rounded-md hover:bg-green-600 transition-colors" title="WhatsApp">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.438 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                                </a>
                                ${deleteBtn}
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
            }
        };

        window.printDocument = () => {
            const date = new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('printDate').innerText = "Tanggal Cetak: " + date;
            window.print();
        };

        window.downloadPDFA4 = () => {
            const data = window.getDataWarga() || [];
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const date = new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
            doc.text("DATA RT/RW DESA RAMBATAN WETAN", 105, 15, { align: 'center' });
            doc.autoTable({
                head: [['No', 'Nama', 'Wilayah', 'Rekening', 'Alamat', 'HP']],
                body: data.map((w, i) => [i + 1, w.Nama || w.nama, `${w.tipeWilayah} ${w.noWilayah}`, w.rekening, w.alamat, w.hp]),
                startY: 25,
                theme: 'grid'
            });
            doc.save(`Data_Warga_${date}.pdf`);
        };

        window.exportExcel = () => {
            const data = window.getDataWarga() || [];
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, "Data_Warga.xlsx");
        };

        let activeId = null;
        window.askDelete = (id) => { activeId = id; document.getElementById('deleteModal').classList.remove('hidden'); };
        window.closeModal = () => { document.getElementById('deleteModal').classList.add('hidden'); };
        window.confirmDelete = () => { window.deleteCitizen(activeId); closeModal(); };

        window.onload = () => {
            document.getElementById('dataForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const formData = {
                    nama: document.getElementById('nama').value,
                    tipeWilayah: document.getElementById('tipeWilayah').value,
                    noWilayah: parseInt(document.getElementById('noWilayah').value),
                    rekening: document.getElementById('rekening').value,
                    hp: document.getElementById('hp').value,
                    alamat: document.getElementById('alamat').value
                };
                window.saveData(formData);
                this.reset();
            });
        };

        <main class="container mx-auto p-4 md:p-8">
            <div id="dataFormContainer" class="bg-white rounded-xl shadow-sm p-6 mb-8 border no-print">
                <h2 class="text-lg font-bold mb-4 text-blue-800">Tambah Data Baru</h2>
                <form id="dataForm" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="nama" placeholder="Nama Lengkap" required class="border rounded-lg p-2.5 outline-none focus:ring-2 focus:ring-blue-500">
                    <div class="flex gap-2">
                        <select id="tipeWilayah" class="border rounded-lg p-2.5 bg-white w-2/3 outline-none">
                            <option value="RW">RW</option>
                            <option value="RT">RT</option>
                        </select>
                        <input type="number" id="noWilayah" placeholder="No" required class="border rounded-lg p-2.5 w-1/3 outline-none">
                    </div>
                    <input type="text" id="rekening" placeholder="Nomor Rekening" required class="border rounded-lg p-2.5 outline-none">
                    <input type="text" id="hp" placeholder="No HP" required class="border rounded-lg p-2.5 outline-none">
                    <input type="text" id="alamat" placeholder="Alamat" required class="border rounded-lg p-2.5 md:col-span-2 outline-none">
                    <button type="submit" class="bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition-colors">Simpan Data</button>
                </form>
            </div>

            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <div class="p-4 bg-gray-50 border-b flex flex-col md:flex-row justify-between items-center gap-4 no-print">
                    <div class="flex gap-2 w-full md:w-auto">
                        <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="Cari..." class="border rounded-lg px-4 py-1.5 text-sm outline-none w-full">
                        <select id="filterWilayah" onchange="renderTable()" class="border rounded-lg px-2 py-1.5 text-sm bg-white outline-none">
                            <option value="Semua">Semua</option>
                            <option value="RW">RW</option>
                            <option value="RT">RT</option>
                        </select>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="printDocument()" class="bg-white border px-4 py-1.5 rounded-lg text-xs font-bold">CETAK</button>
                        <button onclick="downloadPDFA4()" class="bg-red-50 text-red-600 border px-4 py-1.5 rounded-lg text-xs font-bold">PDF</button>
                        <button onclick="exportExcel()" class="bg-green-50 text-green-600 border px-4 py-1.5 rounded-lg text-xs font-bold">EXCEL</button>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left" id="mainTable">
                        <thead class="bg-slate-100 text-slate-600 text-[11px] uppercase tracking-wider">
                            <tr>
                                <th class="px-4 py-3 border">No</th>
                                <th class="px-4 py-3 border">Nama Lengkap</th>
                                <th class="px-4 py-3 border text-center">Wilayah</th>
                                <th class="px-4 py-3 border">No. Rekening</th>
                                <th class="px-4 py-3 border">Alamat</th>
                                <th class="px-4 py-3 border">No. HP</th>
                                <th class="px-4 py-3 border text-center no-print">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="text-sm text-gray-700"></tbody>
                    </table>
                </div>
                <div id="emptyState" class="p-12 text-center text-gray-400 hidden italic">Data tidak ditemukan.</div>
            </div>
        </main>
    </div>

    <div id="deleteModal" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-xs w-full text-center">
            <h3 class="font-bold text-lg mb-6">Hapus Data?</h3>
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 py-2 text-gray-500 font-semibold">Batal</button>
                <button onclick="confirmDelete()" class="flex-1 py-2 bg-red-500 text-white rounded-lg font-bold">Hapus</button>
            </div>
        </div>
    </div>

</body>
</html>
